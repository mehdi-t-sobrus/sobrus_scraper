name: Pipeline CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check src/ tests/

  # ---------------------------------------------------------------------------
  # Tests
  # ---------------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/backend/requirements.txt
          pip install -e .

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
          DJANGO_DEBUG: "True"

  # ---------------------------------------------------------------------------
  # Django migrations check
  # Uses timescale/timescaledb:latest-pg17 (available on Docker Hub)
  # pgvector is enabled manually via psql before migrations run
  # ---------------------------------------------------------------------------
  migrations:
    name: Migrations Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg17
        env:
          POSTGRES_DB: pipeline_gold
          POSTGRES_USER: pipeline_user
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r src/backend/requirements.txt
          pip install -e .

      - name: Install psql client
        run: sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U pipeline_user; do
            sleep 1
          done

      - name: Enable pgvector extension
        env:
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -p 5432 -U pipeline_user -d pipeline_gold \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run migrations
        working-directory: src/backend
        run: python manage.py migrate --no-input
        env:
          DJANGO_SECRET_KEY: ci-test-secret-key
          DJANGO_DEBUG: "True"
          DATABASE_URL: postgresql://pipeline_user:testpassword@localhost:5432/pipeline_gold
          PGPASSWORD: testpassword

      - name: Check no pending migrations
        working-directory: src/backend
        run: python manage.py migrate --check
        env:
          DJANGO_SECRET_KEY: ci-test-secret-key
          DJANGO_DEBUG: "True"
          DATABASE_URL: postgresql://pipeline_user:testpassword@localhost:5432/pipeline_gold
          PGPASSWORD: testpassword

  # ---------------------------------------------------------------------------
  # Deploy (main branch only)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [lint, test, migrations]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /opt/sobrus_scraper
            git pull origin main
            docker compose build
            docker compose up -d
            docker compose exec backend python manage.py migrate --no-input
            docker compose exec backend python manage.py collectstatic --no-input
            echo "Deployment complete at $(date)"
