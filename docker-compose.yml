# =============================================================================
# docker-compose.yml — Production Deployment Blueprint
# Medallion Architecture: Django (Backend) + TimescaleDB + Redis + Dagster
# Deploy target: Hetzner Bare-Metal
# =============================================================================

x-django-env: &django-env
  env_file:
    - .env
  environment:
    DJANGO_SETTINGS_MODULE: core.settings.production

x-restart-policy: &restart-policy
  restart: unless-stopped

x-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "20m"
      max-file: "5"

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  pipeline_net:
    driver: bridge
    name: pipeline_net

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  dagster_home:
    driver: local
  static_files:
    driver: local

# =============================================================================
# SERVICES
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # PostgreSQL + TimescaleDB — Gold Data Warehouse
  # Hosts: Django-managed product catalog, price hypertables, scraper configs
  # ---------------------------------------------------------------------------
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: pipeline_db
    <<: [*restart-policy, *default-logging]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Tune for Hetzner bare-metal workloads (adjust to your RAM)
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init scripts: e.g., create read-only reporting role
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      # Bind to localhost only — never expose raw DB to public interface
      - "127.0.0.1:5432:5432"
    networks:
      - pipeline_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    shm_size: "256mb"
    command: >
      postgres
        -c shared_preload_libraries=timescaledb
        -c max_connections=200
        -c shared_buffers=512MB
        -c effective_cache_size=2GB
        -c maintenance_work_mem=256MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=8MB
        -c min_wal_size=1GB
        -c max_wal_size=4GB

  # ---------------------------------------------------------------------------
  # Redis — Arq Job Queue + Django Cache + Rate-limit State
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    container_name: pipeline_redis
    <<: [*restart-policy, *default-logging]
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory ${REDIS_MAX_MEMORY:-512mb}
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --appendfsync everysec
        --save 900 1
        --save 300 10
        --save 60 10000
    volumes:
      - redis_data:/data
    ports:
      # Bind to localhost only
      - "127.0.0.1:6379:6379"
    networks:
      - pipeline_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Django Backend — ORM Governor, Admin Portal, API (Django Ninja / DRF)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      target: production
    container_name: pipeline_backend
    <<: [*django-env, *restart-policy, *default-logging]
    command: >
      sh -c "
        python src/backend/manage.py migrate --no-input &&
        python src/backend/manage.py collectstatic --no-input &&
        gunicorn core.asgi:application
          --worker-class uvicorn.workers.UvicornWorker
          --workers ${GUNICORN_WORKERS:-4}
          --bind 0.0.0.0:8000
          --timeout 120
          --keep-alive 5
          --access-logfile -
          --error-logfile -
      "
    volumes:
      - ./src/backend:/app/src/backend:ro
      - static_files:/app/staticfiles
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - pipeline_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Arq Scraping Workers — Async Bronze Ingestion (curl_cffi + selectolax)
  # Pulls jobs from Redis queue; writes raw .jsonl.gz → Cloudflare R2 only.
  # Never touches the database directly — enforced by architecture contract.
  # ---------------------------------------------------------------------------
  arq_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      target: production
    container_name: pipeline_arq_worker
    <<: [*django-env, *restart-policy, *default-logging]
    command: arq src.scrapers.worker.WorkerSettings
    volumes:
      - ./src:/app/src:ro
      - ./config:/app/config:ro
    networks:
      - pipeline_net
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    deploy:
      replicas: 1             # Scale horizontally: `--scale arq_worker=N`
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    # Per CLAUDE.md §4: max 5 concurrent workers per domain — enforced in WorkerSettings

  # ---------------------------------------------------------------------------
  # Dagster Webserver (Dagit) — Pipeline Orchestration UI
  # Manages Medallion asset lifecycle: Bronze → Silver → Gold
  # ---------------------------------------------------------------------------
  dagster_webserver:
    build:
      context: .
      dockerfile: docker/Dockerfile.dagster
    container_name: pipeline_dagster_webserver
    <<: [*restart-policy, *default-logging]
    env_file:
      - .env
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_POSTGRES_DB: ${DAGSTER_POSTGRES_DB:-dagster}
      DAGSTER_POSTGRES_USER: ${POSTGRES_USER}
      DAGSTER_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DAGSTER_POSTGRES_HOST: db
      DAGSTER_POSTGRES_PORT: "5432"
    command: dagster-webserver -h 0.0.0.0 -p 3000 -w /opt/dagster/workspace.yaml
    volumes:
      - dagster_home:/opt/dagster/dagster_home
      - ./src/orchestration:/opt/dagster/app/orchestration:ro
      - ./docker/dagster/workspace.yaml:/opt/dagster/workspace.yaml:ro
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - pipeline_net
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/server_info || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # ---------------------------------------------------------------------------
  # Dagster Daemon — Runs schedules, sensors, and backfills in the background
  # Required alongside the webserver for a fully operational Dagster deployment
  # ---------------------------------------------------------------------------
  dagster_daemon:
    build:
      context: .
      dockerfile: docker/Dockerfile.dagster
    container_name: pipeline_dagster_daemon
    <<: [*restart-policy, *default-logging]
    env_file:
      - .env
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_POSTGRES_DB: ${DAGSTER_POSTGRES_DB:-dagster}
      DAGSTER_POSTGRES_USER: ${POSTGRES_USER}
      DAGSTER_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DAGSTER_POSTGRES_HOST: db
      DAGSTER_POSTGRES_PORT: "5432"
    command: dagster-daemon run
    volumes:
      - dagster_home:/opt/dagster/dagster_home
      - ./src/orchestration:/opt/dagster/app/orchestration:ro
      - ./docker/dagster/workspace.yaml:/opt/dagster/workspace.yaml:ro
    networks:
      - pipeline_net
    depends_on:
      db:
        condition: service_healthy
      dagster_webserver:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Nginx — Reverse Proxy & Static File Server
  # Terminates TLS (via Certbot/Let's Encrypt) and routes to backend/dagster
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: pipeline_nginx
    <<: [*restart-policy, *default-logging]
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - static_files:/var/www/staticfiles:ro
      # Mount TLS certs from host (managed by Certbot on the bare-metal host)
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - pipeline_net
    depends_on:
      backend:
        condition: service_healthy
      dagster_webserver:
        condition: service_healthy
