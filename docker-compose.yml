# =============================================================================
# docker-compose.yml — Production
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # Database — PostgreSQL 17 + TimescaleDB + pgvector
  # ---------------------------------------------------------------------------
  db:
    image: timescale/timescaledb-ha:pg17-latest
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-pipeline_gold}
      POSTGRES_USER:     ${POSTGRES_USER:-pipeline_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pipeline_user} -d ${POSTGRES_DB:-pipeline_gold}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redis — Arq job queue
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Backend — Django API + Admin (Gunicorn + Uvicorn workers)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    image: sobrus_scraper/backend:latest
    restart: unless-stopped
    entrypoint: ["/entrypoint.backend.sh"]
    environment:
      DATABASE_URL:             postgresql://${POSTGRES_USER:-pipeline_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pipeline_gold}
      REDIS_URL:                redis://redis:6379/0
      DJANGO_SECRET_KEY:        ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY is required}
      DJANGO_DEBUG:             "False"
      DJANGO_ALLOWED_HOSTS:     ${DJANGO_ALLOWED_HOSTS:-localhost,backend}
      DJANGO_API_KEY:           ${DJANGO_API_KEY:?DJANGO_API_KEY is required}
      R2_LOCAL_DEV_MODE:        ${R2_LOCAL_DEV_MODE:-False}
      R2_ENDPOINT_URL:          ${R2_ENDPOINT_URL:-}
      R2_ACCESS_KEY_ID:         ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY:     ${R2_SECRET_ACCESS_KEY:-}
      R2_BRONZE_BUCKET:         ${R2_BRONZE_BUCKET:-pipeline-bronze}
      GUNICORN_WORKERS:         ${GUNICORN_WORKERS:-4}
    volumes:
      - bronze_data:/app/data/bronze
      - silver_data:/app/data/silver
      - static_files:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Arq Worker — same image as backend, different entrypoint
  # ---------------------------------------------------------------------------
  arq_worker:
    image: sobrus_scraper/backend:latest
    restart: unless-stopped
    entrypoint: ["/entrypoint.worker.sh"]
    environment:
      DATABASE_URL:             postgresql://${POSTGRES_USER:-pipeline_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pipeline_gold}
      REDIS_URL:                redis://redis:6379/0
      DJANGO_SECRET_KEY:        ${DJANGO_SECRET_KEY}
      DJANGO_API_BASE:          http://backend:8000/api/v1
      DJANGO_API_KEY:           ${DJANGO_API_KEY}
      R2_LOCAL_DEV_MODE:        ${R2_LOCAL_DEV_MODE:-False}
      R2_ENDPOINT_URL:          ${R2_ENDPOINT_URL:-}
      R2_ACCESS_KEY_ID:         ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY:     ${R2_SECRET_ACCESS_KEY:-}
      R2_BRONZE_BUCKET:         ${R2_BRONZE_BUCKET:-pipeline-bronze}
      PROXY_LIST:               ${PROXY_LIST:-}
      PROXY_ENDPOINT:           ${PROXY_ENDPOINT:-}
      SCRAPER_MAX_CONCURRENCY_PER_DOMAIN: ${SCRAPER_MAX_CONCURRENCY_PER_DOMAIN:-5}
    volumes:
      - bronze_data:/app/data/bronze
      - hf_cache:/home/pipeline/.cache/huggingface
    depends_on:
      backend:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Dagster Webserver — pipeline UI (port 3000)
  # ---------------------------------------------------------------------------
  dagster_web:
    build:
      context: .
      dockerfile: docker/Dockerfile.dagster
    image: sobrus_scraper/dagster:latest
    restart: unless-stopped
    entrypoint: ["/entrypoint.dagster_web.sh"]
    environment:
      DATABASE_URL:         postgresql://${POSTGRES_USER:-pipeline_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pipeline_gold}
      DJANGO_SECRET_KEY:    ${DJANGO_SECRET_KEY}
      DJANGO_API_BASE:      http://backend:8000/api/v1
      DJANGO_API_KEY:       ${DJANGO_API_KEY}
      R2_LOCAL_DEV_MODE:    ${R2_LOCAL_DEV_MODE:-False}
      R2_ENDPOINT_URL:      ${R2_ENDPOINT_URL:-}
      R2_ACCESS_KEY_ID:     ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_SILVER_BUCKET:     ${R2_SILVER_BUCKET:-pipeline-silver}
      DAGSTER_HOME:         /app/.dagster
    volumes:
      - dagster_storage:/app/.dagster/storage
      - silver_data:/app/data/silver
      - bronze_data:/app/data/bronze
      - hf_cache:/home/pipeline/.cache/huggingface
    ports:
      - "${DAGSTER_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Dagster Daemon — runs schedules + sensors
  # ---------------------------------------------------------------------------
  dagster_daemon:
    image: sobrus_scraper/dagster:latest
    restart: unless-stopped
    entrypoint: ["/entrypoint.dagster_daemon.sh"]
    environment:
      DATABASE_URL:         postgresql://${POSTGRES_USER:-pipeline_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pipeline_gold}
      DJANGO_SECRET_KEY:    ${DJANGO_SECRET_KEY}
      DJANGO_API_BASE:      http://backend:8000/api/v1
      DJANGO_API_KEY:       ${DJANGO_API_KEY}
      R2_LOCAL_DEV_MODE:    ${R2_LOCAL_DEV_MODE:-False}
      R2_ENDPOINT_URL:      ${R2_ENDPOINT_URL:-}
      R2_ACCESS_KEY_ID:     ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_SILVER_BUCKET:     ${R2_SILVER_BUCKET:-pipeline-silver}
      DAGSTER_HOME:         /app/.dagster
    volumes:
      - dagster_storage:/app/.dagster/storage
      - silver_data:/app/data/silver
      - bronze_data:/app/data/bronze
      - hf_cache:/home/pipeline/.cache/huggingface
    depends_on:
      dagster_web:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy (port 80)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
    depends_on:
      backend:
        condition: service_healthy

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  pgdata:
  redisdata:
  bronze_data:
  silver_data:
  dagster_storage:
  hf_cache:
  static_files:
